<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wolds Record Instagram Post Builder</title>
  <style>
    :root{
      --forest:#2F5933;
      --sand:#F4F1EC;
      --navy:#142836;
      --amber:#D6A859;
      --sage:#666E6B;
      --panel:#ffffff;
      --border:#d8d3c8;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:#eee9df;
      color:var(--navy);
    }

    header{
      padding:18px 24px;
      background:var(--sand);
      border-bottom:1px solid var(--border);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }

    h1{font-size:18px;margin:0;color:var(--forest)}

    .app{
      display:grid;
      grid-template-columns: 390px 1fr;
      gap:24px;
      padding:24px;
      max-width:1400px;
      margin:0 auto;
    }

    .controls{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      box-shadow:0 8px 24px rgba(20,40,54,.08);
      align-self:start;
    }

    .field{margin-bottom:14px}

    label{
      display:block;
      font-weight:700;
      font-size:13px;
      margin-bottom:6px;
      color:var(--navy);
    }

    input, textarea, select{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px 12px;
      font:inherit;
      background:#fff;
      color:var(--navy);
    }

    textarea{min-height:88px;resize:vertical}

    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    button{
      border:0;
      border-radius:12px;
      padding:11px 14px;
      font-weight:800;
      cursor:pointer;
      background:var(--forest);
      color:var(--sand);
    }

    button.secondary{
      background:transparent;
      color:var(--forest);
      border:1px solid var(--forest);
    }

    .hint{
      font-size:12px;
      color:var(--sage);
      line-height:1.4;
      margin-top:6px;
    }

    .previewWrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .canvasShell{
      width:100%;
      max-height:82vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:auto;
      padding:8px;
    }

    canvas{
      width:auto;
      height:auto;
      max-width:min(100%,540px);
      max-height:80vh;
      border-radius:18px;
      box-shadow:0 14px 40px rgba(20,40,54,.18);
      background:var(--sand);
    }

    .buttons{display:flex;gap:10px;flex-wrap:wrap}

    .swatches{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:6px;
      margin:8px 0 2px;
    }

    .swatch{
      height:28px;
      border-radius:8px;
      border:1px solid rgba(0,0,0,.1);
    }

    @media(max-width:900px){
      .app{grid-template-columns:1fr}
      .controls{order:2}
      header{align-items:flex-start;flex-direction:column}
    }
  </style>
</head>
<body>
  <header>
    <h1>Wolds Record Instagram Post Builder</h1>
    <div class="hint">Local-only. No uploads. No Canva tax.</div>
  </header>

  <main class="app">
    <section class="controls">
      <div class="field">
        <label for="aspectRatio">Post size</label>
        <select id="aspectRatio">
          <option value="portrait" selected>Portrait feed — 1080 × 1350</option>
          <option value="square">Square feed — 1080 × 1080</option>
          <option value="landscape">Landscape feed — 1080 × 566</option>
        </select>
      </div>

      <div class="field">
        <label for="template">Template</label>
        <select id="template">
          <option value="hook">Hook slide</option>
          <option value="problem">Problem slide</option>
          <option value="feature">Feature / benefit slide</option>
          <option value="cta">CTA slide</option>
        </select>
      </div>

      <div class="field">
        <label for="kicker">Small label</label>
        <input id="kicker" value="Wolds Record" />
      </div>

      <div class="field">
        <label for="headline">Headline</label>
        <textarea id="headline">Built for dogs.
Not horses.
Not everyone.</textarea>
        <div class="hint">Line breaks are preserved. Keep it punchy.</div>
      </div>

      <div class="field">
        <label for="emphasis">Word to highlight green</label>
        <input id="emphasis" value="dogs" />
      </div>

      <div class="field">
        <label for="body">Supporting text</label>
        <textarea id="body">Record keeping designed specifically for canine therapists.</textarea>
      </div>

      <div class="field">
        <label for="footer">Footer / CTA</label>
        <input id="footer" value="Follow along as we build Wolds Record 🐾" />
      </div>

      <div class="row">
        <div class="field">
          <label for="logoUpload">Logo</label>
          <input id="logoUpload" type="file" accept="image/*" />
        </div>
        <div class="field">
          <label for="imageUpload">Optional image</label>
          <input id="imageUpload" type="file" accept="image/*" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="imageOpacity">Image opacity</label>
          <input id="imageOpacity" type="range" min="0" max="100" value="18" />
        </div>
        <div class="field">
          <label for="safeMode">Layout density</label>
          <select id="safeMode">
            <option value="normal">Normal</option>
            <option value="airy" selected>Airy</option>
            <option value="bold">Bold</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Brand colours</label>
        <div class="swatches">
          <div class="swatch" style="background:#2F5933" title="Forest"></div>
          <div class="swatch" style="background:#F4F1EC" title="Sand"></div>
          <div class="swatch" style="background:#142836" title="Navy"></div>
          <div class="swatch" style="background:#D6A859" title="Amber"></div>
          <div class="swatch" style="background:#666E6B" title="Sage"></div>
        </div>
      </div>

      <div class="buttons">
        <button id="download">Download PNG</button>
        <button class="secondary" id="reset">Reset text</button>
      </div>

      <p class="hint">
        Portrait is best for feed carousels. Square is safer for grid aesthetics.
        Landscape exists because Instagram allows it, not because it is your best mate.
      </p>
    </section>

    <section class="previewWrap">
      <div class="canvasShell">
        <canvas id="canvas" width="1080" height="1350"></canvas>
      </div>
      <div class="buttons">
        <button id="download2">Download PNG</button>
      </div>
    </section>
  </main>

<script>
const C = {
  forest:"#2F5933",
  sand:"#F4F1EC",
  navy:"#142836",
  amber:"#D6A859",
  sage:"#666E6B"
};

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let logoImg = null;
let photoImg = null;

const $ = id => document.getElementById(id);

const controls = [
  "aspectRatio",
  "template",
  "kicker",
  "headline",
  "emphasis",
  "body",
  "footer",
  "imageOpacity",
  "safeMode"
];

controls.forEach(id => $(id).addEventListener("input", draw));

function setCanvasSize(){
  const ratio = $("aspectRatio").value;

  if(ratio === "square"){
    canvas.width = 1080;
    canvas.height = 1080;
  } else if(ratio === "landscape"){
    canvas.width = 1080;
    canvas.height = 566;
  } else {
    canvas.width = 1080;
    canvas.height = 1350;
  }
}

function scaleToHeight(value, H){
  return value * (H / 1350);
}

function loadImageFromInput(input, cb){
  const file = input.files && input.files[0];
  if(!file){
    cb(null);
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => cb(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

$("logoUpload").addEventListener("change", () => {
  loadImageFromInput($("logoUpload"), img => {
    logoImg = img;
    draw();
  });
});

$("imageUpload").addEventListener("change", () => {
  loadImageFromInput($("imageUpload"), img => {
    photoImg = img;
    draw();
  });
});

$("template").addEventListener("change", () => {
  const t = $("template").value;

  const presets = {
    hook:{
      headline:"Built for dogs.\nNot horses.\nNot everyone.",
      emphasis:"dogs",
      body:"Record keeping designed specifically for canine therapists.",
      footer:"Follow along as we build Wolds Record 🐾"
    },
    problem:{
      headline:"Therapist admin\nshouldn’t be this messy.",
      emphasis:"messy",
      body:"Paper notes, phone photos, spreadsheets and PDFs make it harder to track one dog properly.",
      footer:"Wolds Record is being built to simplify the workflow."
    },
    feature:{
      headline:"Session notes.\nProgress tracking.\nVet-ready reports.",
      emphasis:"Vet-ready",
      body:"Keep each dog’s case history, treatment notes and reports in one calm, organised place.",
      footer:"Built with real canine therapy workflows in mind."
    },
    cta:{
      headline:"Want early access?",
      emphasis:"early",
      body:"We’re inviting canine therapists to help shape Wolds Record before launch.",
      footer:"Join the waitlist via the link in bio."
    }
  };

  $("headline").value = presets[t].headline;
  $("emphasis").value = presets[t].emphasis;
  $("body").value = presets[t].body;
  $("footer").value = presets[t].footer;

  draw();
});

$("reset").addEventListener("click", () => {
  $("template").dispatchEvent(new Event("change"));
});

$("download").addEventListener("click", download);
$("download2").addEventListener("click", download);

function download(){
  draw();

  const link = document.createElement("a");
  const ratio = $("aspectRatio").value;
  const slug = `${$("template").value}-${ratio}-${new Date().toISOString().slice(0,10)}`;

  link.download = `wolds-record-instagram-${slug}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function coverImage(img, x, y, w, h, opacity){
  const scale = Math.max(w / img.width, h / img.height);
  const iw = img.width * scale;
  const ih = img.height * scale;
  const ix = x + (w - iw) / 2;
  const iy = y + (h - ih) / 2;

  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.drawImage(img, ix, iy, iw, ih);
  ctx.restore();
}

function wrapLineByWords(text, maxWidth, font){
  ctx.font = font;

  const words = text.split(" ");
  const lines = [];
  let line = "";

  for(const word of words){
    const test = line ? `${line} ${word}` : word;

    if(ctx.measureText(test).width > maxWidth && line){
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }

  if(line) lines.push(line);
  return lines;
}

function drawHighlightedLine(line, x, y, font, normalColour, highlightWord, highlightColour){
  ctx.font = font;

  if(!highlightWord){
    ctx.fillStyle = normalColour;
    ctx.fillText(line, x, y);
    return;
  }

  const parts = line.split(new RegExp(`(${escapeRegExp(highlightWord)})`, "gi"));
  let xx = x;

  for(const part of parts){
    if(!part) continue;

    const isHit = part.toLowerCase() === highlightWord.toLowerCase();
    ctx.fillStyle = isHit ? highlightColour : normalColour;
    ctx.fillText(part, xx, y);
    xx += ctx.measureText(part).width;
  }
}

function escapeRegExp(s){
  return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function draw(){
  setCanvasSize();

  const W = canvas.width;
  const H = canvas.height;
  const ratio = $("aspectRatio").value;
  const safe = $("safeMode").value;

  const heightScale = H / 1350;

  const margin = safe === "bold" ? 78 : safe === "airy" ? 118 : 96;
  const maxTextWidth = W - (margin * 2);

  let headlineSize;

  if(ratio === "landscape"){
    headlineSize = safe === "bold" ? 58 : safe === "airy" ? 48 : 52;
  } else if(ratio === "square"){
    headlineSize = safe === "bold" ? 78 : safe === "airy" ? 66 : 72;
  } else {
    headlineSize = safe === "bold" ? 92 : safe === "airy" ? 78 : 84;
  }

  const bodySize = ratio === "landscape" ? 25 : ratio === "square" ? 32 : 38;
  const footerSize = ratio === "landscape" ? 22 : ratio === "square" ? 26 : 30;

  const lineHeight = headlineSize * 1.08;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = C.sand;
  ctx.fillRect(0, 0, W, H);

  // Optional image
  if(photoImg){
    const opacity = Number($("imageOpacity").value) / 100;

    if(ratio === "landscape"){
      coverImage(photoImg, W * 0.62, H * 0.08, W * 0.38, H * 0.92, opacity);
    } else {
      coverImage(photoImg, W * 0.52, H * 0.47, W * 0.48, H * 0.53, opacity);
    }
  }

  // Subtle brand shapes
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.fillStyle = C.forest;
  ctx.beginPath();
  ctx.arc(W - 110, scaleToHeight(110, H), 220 * heightScale, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = C.amber;
  ctx.beginPath();
  ctx.arc(W - 90, H - scaleToHeight(90, H), 170 * heightScale, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Logo or text mark
  const topY = ratio === "landscape" ? 48 : 64;
  const logoH = ratio === "landscape" ? 50 : 82;

  if(logoImg){
    const logoRatio = logoImg.width / logoImg.height;
    ctx.drawImage(logoImg, margin, topY, logoH * logoRatio, logoH);
  } else {
    ctx.font = `700 ${ratio === "landscape" ? 24 : 30}px Montserrat, Arial, sans-serif`;
    ctx.fillStyle = C.forest;
    ctx.fillText($("kicker").value, margin, topY + 38);
  }

  // Kicker if logo exists
  if(logoImg){
    ctx.font = `700 ${ratio === "landscape" ? 18 : 24}px Open Sans, Arial, sans-serif`;
    ctx.fillStyle = C.sage;
    ctx.fillText($("kicker").value, margin, topY + logoH + 28);
  }

  // Headline
  const headline = $("headline").value.split("\n");
  const emphasis = $("emphasis").value.trim();
  const headlineFont = `800 ${headlineSize}px Montserrat, Arial, sans-serif`;

  let y;

  if(ratio === "landscape"){
    y = 175;
  } else if(ratio === "square"){
    y = safe === "airy" ? 285 : 250;
  } else {
    y = safe === "airy" ? 360 : 320;
  }

  for(const rawLine of headline){
    const wrapped = wrapLineByWords(rawLine, maxTextWidth, headlineFont);

    for(const line of wrapped){
      drawHighlightedLine(line, margin, y, headlineFont, C.navy, emphasis, C.forest);
      y += lineHeight;
    }
  }

  // Body
  y += ratio === "landscape" ? 24 : 54;

  const bodyFont = `400 ${bodySize}px Open Sans, Arial, sans-serif`;
  ctx.font = bodyFont;
  ctx.fillStyle = C.navy;

  const bodyLines = [];
  $("body").value.split("\n").forEach(p => {
    bodyLines.push(...wrapLineByWords(p, ratio === "landscape" ? W * 0.54 : maxTextWidth * 0.92, bodyFont));
  });

  for(const line of bodyLines){
    if(y > H - 160) break;
    ctx.fillText(line, margin, y);
    y += bodySize * 1.48;
  }

  // Divider
  const dividerY = ratio === "landscape" ? H - 112 : H - scaleToHeight(220, H);

  ctx.strokeStyle = C.forest;
  ctx.lineWidth = ratio === "landscape" ? 4 : 5;
  ctx.beginPath();
  ctx.moveTo(margin, dividerY);
  ctx.lineTo(margin + 170, dividerY);
  ctx.stroke();

  // Footer
  const footerFont = `700 ${footerSize}px Open Sans, Arial, sans-serif`;
  ctx.font = footerFont;
  ctx.fillStyle = C.forest;

  const footerLines = wrapLineByWords($("footer").value, ratio === "landscape" ? W * 0.58 : maxTextWidth * 0.88, footerFont);

  let fy = dividerY + (ratio === "landscape" ? 44 : 65);

  for(const line of footerLines){
    if(fy > H - 48) break;
    ctx.fillText(line, margin, fy);
    fy += footerSize * 1.45;
  }

  // Handle
  ctx.font = `600 ${ratio === "landscape" ? 17 : 22}px Open Sans, Arial, sans-serif`;
  ctx.fillStyle = C.sage;
  ctx.fillText("@woldsrecord", margin, H - 44);
}

draw();
</script>
</body>
</html>
